name: Publish piece-ui to npm

on:
  push:
    branches: [main, develop]
    paths:
      - 'packages/ui/**'
      - '.github/workflows/publish-ui.yml'
  workflow_dispatch:
    inputs:
      increment:
        description: 'Version increment for main (ignored on develop)'
        type: choice
        required: false
        default: patch
        options: [patch, minor, major]

permissions:
  contents: write

concurrency:
  group: publish-ui-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build & publish
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref_name }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build piece-ui
        run: pnpm --filter piece-ui build

      - name: Release alpha (develop)
        if: github.ref == 'refs/heads/develop'
        run: pnpm --filter piece-ui exec release-it --ci --preRelease=alpha --npm.tag=alpha
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Release stable (main)
        if: github.ref == 'refs/heads/main'
        run: pnpm --filter piece-ui exec release-it --ci --increment=${{ github.event.inputs.increment || 'patch' }} --npm.tag=latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
